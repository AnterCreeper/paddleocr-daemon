services:
  paddleocr-daemon:
    container_name: paddleocr-daemon
    build: ./
    restart: unless-stopped
    network_mode: bridge
    ports:
      - "8080:8080"
    volumes:
      - paddleocr-models:/root/.paddlex
      - /root/.paddleocr:/etc/paddleocr
    shm_size: 8g
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
volumes:
  paddleocr-models:
